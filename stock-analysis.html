<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Analysis – BelFed Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#f5f5f0;--gray:#888;--border:#d0d0ca;--green:#1a6b3a;--red:#8b1a1a;--font:'Courier Prime','Courier New',monospace}
body{font-family:var(--font);background:var(--white);color:var(--black);font-size:15px;line-height:1.6}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:56px}
.nav-logo{font-size:17px;font-weight:700;letter-spacing:0.05em;text-decoration:none;color:var(--black)}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;color:var(--black);transition:opacity 0.2s}
.nav-links a:hover{opacity:0.5}
main{padding-top:56px}
.hero{padding:80px 40px 40px;max-width:900px}
.hero .tag{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gray);margin-bottom:20px}
.hero h1{font-size:clamp(28px,5vw,48px);font-weight:700;line-height:1.1;margin-bottom:16px}
.hero p{font-size:15px;color:#555;max-width:560px}
.content{padding:0 40px 60px;max-width:1100px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin-bottom:40px}
.card{background:var(--white);border:1px solid var(--border);padding:28px;transition:border-color 0.2s}
.card:hover{border-color:var(--black)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-ticker{font-size:20px;font-weight:700}
.card-dir{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;border:1px solid}
.card-dir.LONG{color:var(--green);border-color:var(--green)}
.card-dir.SHORT{color:var(--red);border-color:var(--red)}
.card-dir.NEUTRAL{color:var(--gray);border-color:var(--gray)}
.card-status{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gray);margin-bottom:8px}
.card h3{font-size:15px;font-weight:700;margin-bottom:8px}
.card p{font-size:13px;color:#555;line-height:1.6;margin-bottom:12px}
.card-chart{width:100%;margin-bottom:12px;border:1px solid var(--border);cursor:pointer;transition:opacity 0.2s}
.card-chart:hover{opacity:0.9}
.card-chart-link{display:inline-block;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--black);text-decoration:none;padding:8px 0;margin-bottom:12px;border-bottom:1px solid var(--border);transition:opacity 0.2s}
.card-chart-link:hover{opacity:0.5}
.card-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;color:var(--gray)}
.card-meta span{color:var(--black);font-weight:700}
.card-date{font-size:10px;color:var(--gray);margin-top:12px;padding-top:8px;border-top:1px solid var(--border)}
.loading{text-align:center;padding:60px 40px;color:var(--gray);font-size:13px;letter-spacing:0.1em;text-transform:uppercase}
.search-bar{max-width:400px;margin-bottom:24px}
.search-bar input{width:100%;font-family:var(--font);font-size:14px;padding:10px 12px;border:1px solid var(--border);background:var(--white);color:var(--black);letter-spacing:0.05em}
.search-bar input:focus{outline:none;border-color:var(--black)}
.search-bar input::placeholder{color:var(--gray);text-transform:uppercase;font-size:11px;letter-spacing:0.12em}
.lightbox{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:1000;cursor:pointer;align-items:center;justify-content:center}
.lightbox.active{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border:2px solid var(--white)}
</style>
</head>
<body>
<nav>
  <a href="/members.html" class="nav-logo">← Members</a>
  <ul class="nav-links">
    <li><a href="/members.html">Home</a></li>
    <li><a href="/dashboard.html">Dashboard</a></li>
    <li><a href="/stock-analysis.html">Analysis</a></li>
  </ul>
</nav>
<main>
  <section class="hero">
    <div class="tag">Members Only</div>
    <h1>Stock Analysis</h1>
    <p>Asset analysis from BelFed Analytics. Updated regularly with entry, target, and stop levels.</p>
  </section>
    <section class="content">
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search ticker..." oninput="filterCards()">
    </div>
    <div class="cards" id="cards">
      <div class="loading" id="loading">Loading analysis...</div>
    </div>
  </section>
</main>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
  <img id="lightbox-img" src="" alt="Chart">
</div>

<script>
const SUPABASE_URL = 'https://obujqvqqmyfcfflhqvud.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9idWpxdnFxbXlmY2ZmbGhxdnVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDgxNjYsImV4cCI6MjA4OTkyNDE2Nn0.syl4YBLbf8aBitxyK3gCL51pPYxWjEW99mMTXJaQQ8w';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}

async function load() {
  const { data, error } = await sb
    .from('stock_analysis')
    .select('*')
    .order('published_at', { ascending: false });

  const el = document.getElementById('cards');
  const ld = document.getElementById('loading');
  if (ld) ld.remove();

  if (error || !data || data.length === 0) {
    el.innerHTML = '<div class="loading">No analysis available yet.</div>';
    return;
  }

  el.innerHTML = data.map(r => {
    const dir = (r.direction || 'NEUTRAL').toUpperCase();
    const status = (r.status || 'active').toUpperCase();
    const date = new Date(r.published_at).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
    const chartHtml = r.image_url
      ? '<img class="card-chart" src="' + r.image_url + '" alt="' + (r.ticker || '') + ' chart" onclick="openLightbox(this.src)" loading="lazy">'
      : '';
    return '<div class="card">' +
      '<div class="card-head">' +
        '<div class="card-ticker">' + (r.ticker || '') + '</div>' +
        '<div class="card-dir ' + dir + '">' + dir + '</div>' +
      '</div>' +
      '<div class="card-status">' + status + '</div>' +
      '<h3>' + (r.title || '') + '</h3>' +
      '<p>' + (r.summary || '') + '</p>' +
      chartHtml +
            (r.analysis_url ? '<a class="card-chart-link" href="' + r.analysis_url + '" target="_blank">↗ View Chart on TradingView</a>' : '') +
      '<div class="card-meta">' +
        '<div>Entry: <span>' + (r.entry_zone || '—') + '</span></div>' +
        '<div>Target: <span>' + (r.target || '—') + '</span></div>' +
        '<div>Stop: <span>' + (r.stop_loss || '—') + '</span></div>' +
        '<div>Timeframe: <span>' + (r.timeframe || '—') + '</span></div>' +
      '</div>' +
      '<div class="card-date">Published ' + date + '</div>' +
    '</div>';
  }).join('');
}

function filterCards() {
  const q = document.getElementById('search').value.toUpperCase().trim();
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    const ticker = card.querySelector('.card-ticker').textContent.toUpperCase();
    card.style.display = ticker.includes(q) ? '' : 'none';
  });
}
load();
</script>
</body>
</html>
