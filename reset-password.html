<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co;">
<title>Reset Password — BELFED</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background-color:#f5f2eb;font-family:'Courier New',Courier,monospace;color:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.reset-box{background:#fff;border:2px solid #000;padding:40px;max-width:420px;width:100%;text-align:center}
.reset-box h2{font-size:18px;letter-spacing:3px;margin-bottom:8px}
.reset-box .sub{font-size:11px;opacity:0.5;margin-bottom:24px;letter-spacing:1px}
.reset-box input[type=password]{font-family:'Courier New',monospace;width:100%;padding:10px 14px;font-size:13px;border:1px solid #000;background:#f5f2eb;margin-bottom:12px;outline:none}
.reset-box input:focus{background:#fff}
.reset-box .btn{font-family:'Courier New',monospace;width:100%;padding:12px;font-size:13px;font-weight:bold;letter-spacing:2px;background:#000;color:#f5f2eb;border:none;cursor:pointer;margin-top:6px}
.reset-box .btn:hover{background:#222}
.reset-box .btn:disabled{background:#666;cursor:not-allowed}
.status{font-size:12px;margin-top:12px}
.status.error{color:#c50000}
.status.success{color:#1a7a1a}
</style>
</head>
<body>
<div class="reset-box">
<h2>&mdash; BELFED_ &mdash;</h2>
<div class="sub">RESET PASSWORD</div>
<input type="password" id="newPassword" placeholder="New password (min 6 chars)">
<input type="password" id="confirmPassword" placeholder="Confirm new password">
<button class="btn" id="updateBtn" onclick="handleUpdatePassword()">UPDATE PASSWORD</button>
<div class="status" id="statusMsg"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SUPABASE_URL='https://obujqvqqmyfcfflhqvud.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9idWpxdnFxbXlmY2ZmbGhxdnVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDgxNjYsImV4cCI6MjA4OTkyNDE2Nn0.syl4YBLbf8aBitxyK3gCL51pPYxWjEW99mMTXJaQQ8w';
var supaClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
async function handleUpdatePassword(){
var pw=document.getElementById('newPassword').value;
var pw2=document.getElementById('confirmPassword').value;
var statusEl=document.getElementById('statusMsg');
var btn=document.getElementById('updateBtn');
statusEl.className='status';statusEl.textContent='';
if(!pw||!pw2){statusEl.className='status error';statusEl.textContent='Please fill in both fields';return;}
if(pw!==pw2){statusEl.className='status error';statusEl.textContent='Passwords do not match';return;}
if(pw.length<6){statusEl.className='status error';statusEl.textContent='Password must be at least 6 characters';return;}
btn.disabled=true;btn.textContent='UPDATING...';
try{
var res=await supaClient.auth.updateUser({password:pw});
if(res.error)throw res.error;
statusEl.className='status success';statusEl.textContent='Password updated! Redirecting...';
setTimeout(function(){window.location.href='/dashboard.html';},2000);
}catch(err){
statusEl.className='status error';statusEl.textContent=err.message||'Error updating password';
btn.disabled=false;btn.textContent='UPDATE PASSWORD';
}
}
</script>
</body>
</html>
