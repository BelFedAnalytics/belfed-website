<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отписаться от рассылки | BelFed Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --black:#0a0a0a; --white:#f5f5f0; --gray:#888; --border:#d0d0ca;
      --font:'Courier Prime','Courier New',monospace; --green:#1a7a1a; --red:#a14040;
    }
    body { font-family:var(--font); background:var(--white); color:var(--black); font-size:15px; line-height:1.6; min-height:100vh; display:flex; flex-direction:column; }
    nav { display:flex; align-items:center; justify-content:space-between; padding:0 40px; height:56px; border-bottom:1px solid var(--border); }
    .nav-logo { font-size:17px; font-weight:700; letter-spacing:.05em; text-decoration:none; color:var(--black); }
    main { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    .card { max-width:520px; width:100%; padding:40px; background:#faf6e8; border:1px solid #e0d8c5; }
    h1 { font-size:22px; letter-spacing:.05em; margin-bottom:18px; }
    .status { padding:14px 16px; margin:18px 0; border:1px dashed var(--border); font-size:14px; }
    .status.ok { border-color:var(--green); color:var(--green); background:rgba(26,122,26,.06); }
    .status.err { border-color:var(--red); color:var(--red); background:rgba(161,64,64,.05); }
    p { font-size:13px; color:#444; margin-bottom:14px; }
    a.btn { display:inline-block; padding:10px 18px; border:1px solid var(--black); color:var(--black); text-decoration:none; font-size:12px; letter-spacing:.1em; text-transform:uppercase; margin-top:14px; }
    a.btn:hover { background:var(--black); color:var(--white); }
    footer { border-top:1px solid var(--border); padding:18px 40px; font-size:11px; color:var(--gray); letter-spacing:.08em; }
  </style>
</head>
<body>
  <nav><a class="nav-logo" href="/">BelFed</a></nav>
  <main>
    <div class="card">
      <h1>// Отписка от рассылки</h1>
      <div id="status" class="status">Обработка запроса…</div>
      <p>Если вы передумали — снова включить уведомления можно в личном кабинете на странице <a href="/members.html#email">Аккаунт → Email-уведомления</a>.</p>
      <a class="btn" href="/">На главную</a>
    </div>
  </main>
  <footer>&copy; 2025–2026 BelFed Analytics</footer>

  <script>
    var SUPABASE_URL = 'https://obujqvqqmyfcfflhqvud.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9idWpxdnFxbXlmY2ZmbGhxdnVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDgxNjYsImV4cCI6MjA4OTkyNDE2Nn0.syl4YBLbf8aBitxyK3gCL51pPYxWjEW99mMTXJaQQ8w';
    (async function(){
      var st = document.getElementById('status');
      var token = new URLSearchParams(location.search).get('token') || '';
      if (!token) {
        st.className = 'status err';
        st.textContent = 'Ссылка некорректна: не указан токен. Используйте ссылку из письма.';
        return;
      }
      try {
        var r = await fetch(SUPABASE_URL + '/functions/v1/email-unsubscribe', {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token })
        });
        var j = await r.json().catch(function(){ return {}; });
        if (r.ok && j.ok) {
          st.className = 'status ok';
          st.textContent = 'Готово. ' + (j.email ? j.email + ' ' : '') + 'отписан(а) от рассылки BelFed.';
        } else if (r.status === 404) {
          st.className = 'status err';
          st.textContent = 'Подписка не найдена. Возможно, вы уже отписались.';
        } else {
          st.className = 'status err';
          st.textContent = 'Не удалось обработать запрос: ' + (j.error || r.status);
        }
      } catch(e) {
        st.className = 'status err';
        st.textContent = 'Сетевая ошибка: ' + e.message;
      }
    })();
  </script>
</body>
</html>
